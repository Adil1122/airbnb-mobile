name: airbnb_mobile
description: "Airbnb Clone - Full Production App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.6.0
  http_parser: ^4.0.2
  web_socket_channel: ^3.0.2

  # Storage & Auth
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^9.2.4

  # Media
  image_picker: ^1.2.1
  cached_network_image: ^3.4.1

  # Maps & Location
  google_maps_flutter: ^2.7.0
  geolocator: ^13.0.4
  geocoding: ^3.0.0

  # Firebase / Push Notifications
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Payments
  flutter_stripe: ^11.0.0

  # Utilities
  url_launcher: ^6.3.1
  intl: ^0.19.0
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
